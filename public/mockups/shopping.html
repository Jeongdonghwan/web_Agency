<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODEN - Premium Fashion Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0A0A0A;
      color: #fff;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(20px);
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 8px;
    }

    .nav {
      display: flex;
      gap: 40px;
    }

    .nav a {
      text-decoration: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav a:hover {
      color: #D4AF37;
    }

    .header-icons {
      display: flex;
      gap: 24px;
      font-size: 1.2rem;
    }

    .header-icons span {
      cursor: pointer;
      transition: color 0.3s;
    }

    .header-icons span:hover {
      color: #D4AF37;
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=1400&q=80') center/cover;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(10, 10, 10, 0.95) 0%, rgba(10, 10, 10, 0.7) 50%, rgba(10, 10, 10, 0.4) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 0 60px;
      max-width: 700px;
    }

    .hero-tag {
      display: inline-block;
      color: #D4AF37;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-left: 60px;
      position: relative;
    }

    .hero-tag::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 40px;
      height: 1px;
      background: #D4AF37;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      font-weight: 500;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }

    .hero-title span {
      font-style: italic;
      color: #D4AF37;
    }

    .hero-desc {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.8;
      margin-bottom: 48px;
      font-weight: 300;
    }

    .hero-btns {
      display: flex;
      gap: 20px;
    }

    .btn-primary {
      background: #D4AF37;
      color: #0A0A0A;
      border: none;
      padding: 18px 48px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      background: #fff;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 18px 48px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      border-color: #D4AF37;
      color: #D4AF37;
    }

    /* Categories */
    .categories {
      padding: 120px 60px;
      background: #0A0A0A;
    }

    .section-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-tag {
      display: inline-block;
      color: #D4AF37;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      color: #fff;
      font-weight: 500;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .category-card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      cursor: pointer;
    }

    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s ease;
    }

    .category-card:hover img {
      transform: scale(1.1);
    }

    .category-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10, 10, 10, 0.9) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 30px;
    }

    .category-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .category-count {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Footer hint */
    .footer-hint {
      padding: 40px;
      background: #0A0A0A;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .footer-hint p {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">MODEN</div>
    <nav class="nav">
      <a href="#">Women</a>
      <a href="#">Men</a>
      <a href="#">Accessories</a>
      <a href="#">Sale</a>
      <a href="#">Lookbook</a>
    </nav>
    <div class="header-icons">
      <span>🔍</span>
      <span>👤</span>
      <span>🛒</span>
    </div>
  </header>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <span class="hero-tag">Winter Collection 2024</span>
      <h1 class="hero-title">
        Timeless<br>
        <span>Elegance</span>
      </h1>
      <p class="hero-desc">
        절제된 아름다움으로 완성하는 프리미엄 패션.<br>
        당신만의 스타일을 MODEN에서 발견하세요.
      </p>
      <div class="hero-btns">
        <button class="btn-primary">Shop Now</button>
        <button class="btn-secondary">View Lookbook</button>
      </div>
    </div>
  </section>

  <section class="categories">
    <div class="section-header">
      <span class="section-tag">Categories</span>
      <h2 class="section-title">Shop by Category</h2>
    </div>
    <div class="categories-grid">
      <div class="category-card">
        <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=600&q=80" alt="Women">
        <div class="category-overlay">
          <h3 class="category-name">Women</h3>
          <span class="category-count">248 items</span>
        </div>
      </div>
      <div class="category-card">
        <img src="https://images.unsplash.com/photo-1617137968427-85924c800a22?w=600&q=80" alt="Men">
        <div class="category-overlay">
          <h3 class="category-name">Men</h3>
          <span class="category-count">186 items</span>
        </div>
      </div>
      <div class="category-card">
        <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600&q=80" alt="Bags">
        <div class="category-overlay">
          <h3 class="category-name">Bags</h3>
          <span class="category-count">94 items</span>
        </div>
      </div>
      <div class="category-card">
        <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600&q=80" alt="Accessories">
        <div class="category-overlay">
          <h3 class="category-name">Accessories</h3>
          <span class="category-count">127 items</span>
        </div>
      </div>
    </div>
  </section>

  <div class="footer-hint">
    <p>© 2024 MODEN. All rights reserved.</p>
  </div>
</body>
</html>
