<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BREW HOUSE - 감성 카페</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #FAF7F2;
      color: #3D2C1E;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(250, 247, 242, 0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid rgba(139, 90, 43, 0.1);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #8B5A2B;
      letter-spacing: 2px;
    }

    .nav {
      display: flex;
      gap: 40px;
    }

    .nav a {
      text-decoration: none;
      color: #5C4033;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    .nav a:hover {
      color: #8B5A2B;
    }

    .header-btn {
      background: #8B5A2B;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .header-btn:hover {
      background: #6B4423;
      transform: translateY(-2px);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      right: 0;
      top: 0;
      width: 55%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200&q=80') center/cover;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #FAF7F2 0%, transparent 30%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 0 60px;
      max-width: 600px;
    }

    .hero-tag {
      display: inline-block;
      background: rgba(139, 90, 43, 0.1);
      color: #8B5A2B;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.2;
      color: #3D2C1E;
      margin-bottom: 24px;
    }

    .hero-title span {
      color: #8B5A2B;
    }

    .hero-desc {
      font-size: 1.1rem;
      color: #6B5344;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
    }

    .btn-primary {
      background: #8B5A2B;
      color: #fff;
      border: none;
      padding: 16px 36px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      background: #6B4423;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139, 90, 43, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: #5C4033;
      border: 2px solid rgba(139, 90, 43, 0.3);
      padding: 16px 36px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      border-color: #8B5A2B;
      color: #8B5A2B;
    }

    /* Features */
    .features {
      padding: 100px 60px;
      background: #fff;
    }

    .section-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139, 90, 43, 0.1);
      color: #8B5A2B;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #3D2C1E;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .feature-card {
      background: #FAF7F2;
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      transition: all 0.4s;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(139, 90, 43, 0.1);
    }

    .feature-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #8B5A2B 0%, #A0522D 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    .feature-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #3D2C1E;
      margin-bottom: 12px;
    }

    .feature-desc {
      font-size: 0.9rem;
      color: #6B5344;
      line-height: 1.7;
    }

    /* Footer hint */
    .footer-hint {
      padding: 40px;
      background: #3D2C1E;
      text-align: center;
    }

    .footer-hint p {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">BREW HOUSE</div>
    <nav class="nav">
      <a href="#">메뉴</a>
      <a href="#">스토리</a>
      <a href="#">매장안내</a>
      <a href="#">이벤트</a>
    </nav>
    <button class="header-btn">예약하기</button>
  </header>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <span class="hero-tag">SPECIALTY COFFEE</span>
      <h1 class="hero-title">
        하루의 <span>여유</span>를<br>
        한 잔에 담다
      </h1>
      <p class="hero-desc">
        엄선된 원두로 정성껏 내린 커피 한 잔.<br>
        바쁜 일상 속 작은 쉼표가 되어드립니다.
      </p>
      <div class="hero-btns">
        <button class="btn-primary">메뉴 보기</button>
        <button class="btn-secondary">매장 찾기</button>
      </div>
    </div>
  </section>

  <section class="features">
    <div class="section-header">
      <span class="section-tag">WHY BREW HOUSE</span>
      <h2 class="section-title">특별한 이유</h2>
    </div>
    <div class="features-grid">
      <div class="feature-card">
        <div class="feature-icon">☕</div>
        <h3 class="feature-title">스페셜티 원두</h3>
        <p class="feature-desc">전 세계 유명 산지의 프리미엄 원두만을 엄선합니다</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🏠</div>
        <h3 class="feature-title">감성 인테리어</h3>
        <p class="feature-desc">따뜻하고 아늑한 공간에서 여유로운 시간을 보내세요</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🍰</div>
        <h3 class="feature-title">수제 디저트</h3>
        <p class="feature-desc">매일 아침 직접 구워내는 신선한 베이커리</p>
      </div>
    </div>
  </section>

  <div class="footer-hint">
    <p>© 2024 BREW HOUSE. All rights reserved.</p>
  </div>
</body>
</html>
