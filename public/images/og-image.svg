<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="1100" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="530" r="150" fill="rgba(255,255,255,0.05)"/>

  <!-- 로고 영역 -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="white"/>
  <text x="120" y="135" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2563eb" text-anchor="middle">JD8</text>

  <!-- 메인 텍스트 -->
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">고퀄리티 반응형</text>
