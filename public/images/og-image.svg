  <!-- 서브 텍스트 -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">반응형 웹사이트 | 랜딩페이지 | 기업 홈페이지</text>

  <!-- 하단 URL -->
